---
services:
  backend:
    build: ./backend
    ports:
      - "8002:8000"
    env_file:
      - .env
    develop:
      watch:
        - action: sync
          path: ./backend/src
          target: /app/src

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "3002:3002"
    environment:
      VITE_BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./frontend/src
          target: /app/src
