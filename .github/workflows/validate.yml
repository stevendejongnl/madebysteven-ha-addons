---
name: Validate addons

"on":
  push:
    branches: [main]
  pull_request:

jobs:
  discover:
    name: Discover addons
    runs-on: ubuntu-latest
    outputs:
      addons: ${{ steps.find.outputs.addons }}
    steps:
      - uses: actions/checkout@v4
      - name: Find addons with a config.yaml
        id: find
        run: |
          addons=$(
            find . -maxdepth 2 -name "config.yaml" -not -path "./.github/*" \
              | sed 's|/config.yaml||' | sed 's|^\./||' \
              | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )
          echo "addons=$addons" >> "$GITHUB_OUTPUT"

  # ── HA addon config validation ─────────────────────────────────────────────

  addon-lint:
    name: Addon lint — ${{ matrix.addon }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.discover.outputs.addons) }}
    steps:
      - uses: actions/checkout@v4
      - name: Run HA addon linter
        uses: frenck/action-addon-linter@v2
        with:
          path: ./${{ matrix.addon }}

  yamllint:
    name: YAML lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run YAMLLint
        uses: frenck/action-yamllint@v1

  # ── Code quality ───────────────────────────────────────────────────────────

  hadolint:
    name: Dockerfile lint — ${{ matrix.addon }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.discover.outputs.addons) }}
    steps:
      - uses: actions/checkout@v4
      - name: Run hadolint
        run: |
          docker run --rm \
            --entrypoint /bin/hadolint \
            -v "$(pwd)/.hadolint.yaml:/.hadolint.yaml:ro" \
            -v "$(pwd)/${{ matrix.addon }}/Dockerfile:/Dockerfile:ro" \
            hadolint/hadolint \
            --config /.hadolint.yaml /Dockerfile

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck
        run: |
          shellcheck -x \
            scripts/shared.sh \
            scripts/pre-commit \
            scripts/pre-push \
            scripts/install-hooks.sh \
            picnic/run.sh \
            dwmp/run.sh

  backend:
    name: Backend — ${{ matrix.addon }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.discover.outputs.addons) }}
    env:
      ADDON: ${{ matrix.addon }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect backend
        id: detect
        run: |
          if [[ -f "${ADDON}/backend/pyproject.toml" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Addon ${ADDON} has no backend/ — skipping."
          fi
      - uses: astral-sh/setup-uv@v5
        if: steps.detect.outputs.present == 'true'
        with:
          enable-cache: true
      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: ${{ matrix.addon }}/backend
        run: uv sync
      - name: Lint (ruff)
        if: steps.detect.outputs.present == 'true'
        working-directory: ${{ matrix.addon }}/backend
        run: uv run ruff check .
      - name: Type check (mypy)
        if: steps.detect.outputs.present == 'true'
        working-directory: ${{ matrix.addon }}/backend
        run: uv run mypy src
      - name: Tests (pytest)
        if: steps.detect.outputs.present == 'true'
        working-directory: ${{ matrix.addon }}/backend
        run: uv run pytest

  frontend:
    name: Frontend — ${{ matrix.addon }}
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.discover.outputs.addons) }}
    env:
      ADDON: ${{ matrix.addon }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect frontend
        id: detect
        run: |
          if [[ -f "${ADDON}/frontend/package.json" ]]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "Addon ${ADDON} has no frontend/ — skipping."
          fi
      - uses: actions/setup-node@v4
        if: steps.detect.outputs.present == 'true'
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ${{ matrix.addon }}/frontend/package-lock.json
      - name: Install dependencies
        if: steps.detect.outputs.present == 'true'
        working-directory: ${{ matrix.addon }}/frontend
        run: npm ci
      - name: Lint (eslint)
        if: steps.detect.outputs.present == 'true'
        working-directory: ${{ matrix.addon }}/frontend
        run: npm run lint
      - name: Type check (tsc)
        if: steps.detect.outputs.present == 'true'
        working-directory: ${{ matrix.addon }}/frontend
        run: npm run typecheck
      - name: Tests (vitest)
        if: steps.detect.outputs.present == 'true'
        working-directory: ${{ matrix.addon }}/frontend
        run: npm test

  # ── HA build validation (main branch / PRs targeting main only) ────────────

  docker-build:
    name: Docker build — ${{ matrix.addon }}
    needs: discover
    runs-on: ubuntu-latest
    if: >
      github.ref == 'refs/heads/main' ||
      github.base_ref == 'main'
    strategy:
      fail-fast: false
      matrix:
        addon: ${{ fromJson(needs.discover.outputs.addons) }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.addon }}
          push: false
          build-args: BUILD_FROM=ghcr.io/home-assistant/amd64-base:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
